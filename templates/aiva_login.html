<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIVA — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
{% if google_client_id %}<script src="https://accounts.google.com/gsi/client" async defer></script>{% endif %}
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #8f8a88;               /* warm grey page backdrop */
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .frame {                              /* light rounded outer frame */
    background: #d9d9d9;
    border-radius: 56px;
    padding: 34px;
    width: min(960px, 100%);
    box-shadow: 0 24px 60px rgba(0,0,0,.35);
  }
  .card {                               /* dark navy inner card */
    position: relative;
    background: #070d17;
    border-radius: 44px;
    padding: 48px 56px 44px;
    overflow: hidden;
    min-height: 540px;
  }
  /* Decorative AIVA ribbon behind the form */
  .ribbon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .ribbon svg { width: 62%; max-width: 460px; opacity: .95; }
  .content { position: relative; z-index: 1; }

  h1 {
    color: #f4f6fa; text-align: center;
    font-weight: 400; font-size: clamp(28px, 4.5vw, 42px); line-height: 1.25;
  }
  h1 span { display: block; }

  form { margin-top: 56px; }
  .fields {
    display: flex; justify-content: space-between; gap: 40px;
    flex-wrap: wrap;
  }
  .field { flex: 1 1 280px; max-width: 340px; }
  .field:last-child { margin-left: auto; }
  .field label {
    display: block; color: #eef1f6;
    font-size: clamp(18px, 2.4vw, 26px); font-weight: 400;
    margin-bottom: 18px; padding-left: 8px;
  }
  .field input {
    width: 100%;
    background: #d9d9d9;
    border: none; outline: none;
    border-radius: 999px;
    padding: 16px 22px;
    font-family: inherit; font-size: 14px; color: #1c2331;
  }
  .field input::placeholder { color: #5c6472; text-decoration: underline; font-size: 12.5px; }
  .field input:focus { box-shadow: 0 0 0 3px rgba(76,196,224,.55); }

  .actions { margin-top: 52px; text-align: center; }
  .btn-login {
    background: #d9d9d9; color: #10141d;
    border: none; cursor: pointer;
    border-radius: 999px;
    font-family: inherit; font-size: 22px; font-weight: 400;
    padding: 14px 84px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(94,234,212,.25); }
  .btn-login:disabled { opacity: .6; cursor: wait; }

  .switch {
    display: inline-block; margin-top: 22px;
    color: #f4f6fa; font-size: clamp(17px, 2.2vw, 24px);
    text-decoration: underline; text-underline-offset: 5px;
    cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .error {
    min-height: 22px; margin-top: 18px; text-align: center;
    color: #ff8f9f; font-size: 14px;
  }
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 26px auto 0; max-width: 360px;
    color: #9aa3b2; font-size: 13px;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: rgba(217,217,217,.25);
  }
  .google-wrap { margin-top: 20px; display: flex; justify-content: center; }
  .btn-google {
    display: inline-flex; align-items: center; gap: 12px;
    background: #d9d9d9; color: #10141d;
    border: none; cursor: pointer; border-radius: 999px;
    font-family: inherit; font-size: 16px; font-weight: 500;
    padding: 12px 32px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(76,196,224,.25); }
  .btn-google svg { width: 20px; height: 20px; }

  @media (max-width: 640px) {
    .frame { border-radius: 32px; padding: 18px; }
    .card { border-radius: 26px; padding: 34px 22px; }
    .fields { gap: 22px; }
    form { margin-top: 36px; }
    .ribbon svg { width: 90%; }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="ribbon" aria-hidden="true">
        <!-- Abstract AIVA ribbon mark: three gradient swooshes -->
        <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gTeal" x1="120" y1="330" x2="330" y2="120" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#19b8d8"/><stop offset="1" stop-color="#27e6a7"/>
            </linearGradient>
            <linearGradient id="gGreen" x1="220" y1="40" x2="300" y2="230" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#2fe08c"/><stop offset="1" stop-color="#1fc9c4"/>
            </linearGradient>
            <linearGradient id="gPurple" x1="90" y1="340" x2="200" y2="170" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#7a3cf0"/><stop offset="1" stop-color="#2f8fe6"/>
            </linearGradient>
          </defs>
          <!-- top arm: tall green ribbon curving down into the centre -->
          <path d="M214 30 C258 74 268 136 240 192 C228 216 208 234 182 246 L162 210 C186 196 202 178 210 154 C220 122 208 84 180 56 C190 44 202 35 214 30 Z" fill="url(#gGreen)"/>
          <!-- right arm: wide cyan swoosh sweeping to a tip at bottom right -->
          <path d="M170 240 C216 206 276 202 322 232 C352 252 372 284 380 322 L336 344 C326 308 306 282 274 268 C240 254 206 258 180 278 Z" fill="url(#gTeal)"/>
          <!-- left arm: purple-blue tail flowing down to bottom left -->
          <path d="M196 236 C158 248 128 272 110 308 C98 332 92 356 94 382 L140 370 C138 344 144 318 160 298 C174 280 192 268 214 262 Z" fill="url(#gPurple)"/>
        </svg>
      </div>

      <div class="content">
        <h1>AIVA<span id="subtitle">Enter your credentials</span></h1>

        <form id="authForm" autocomplete="on">
          <div class="fields">
            <div class="field">
              <label for="username">Username</label>
              <input id="username" name="username" type="text"
                     placeholder="Please Enter your username" autocomplete="username" required/>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password"
                     placeholder="Please Enter your Password" autocomplete="current-password" required/>
            </div>
          </div>

          <div class="actions">
            <button class="btn-login" id="submitBtn" type="submit">Login</button>
            <br/>
            <button class="switch" id="modeSwitch" type="button">Create an account</button>
            <div class="error" id="errorBox" role="alert"></div>

            <div class="divider">or</div>
            <div class="google-wrap">
              {% if google_client_id %}
              <div id="g_id_onload"
                   data-client_id="{{ google_client_id }}"
                   data-callback="onGoogleCredential"
                   data-auto_prompt="false"></div>
              <div class="g_id_signin" data-type="standard" data-theme="filled_black"
                   data-text="continue_with" data-shape="pill"></div>
              {% else %}
              <button type="button" class="btn-google" id="googleFallback">
                <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.8 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.2C12.4 13.4 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 6.9-10.3 6.9-17.7z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l7.9-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.7-6c-2.1 1.4-4.8 2.3-7.8 2.3-6.3 0-11.6-3.9-13.5-9.4l-7.9 6.2C6.5 42.6 14.6 48 24 48z"/></svg>
                Continue with Google
              </button>
              {% endif %}
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

<script>
  let registerMode = false;
  const form      = document.getElementById('authForm');
  const btn       = document.getElementById('submitBtn');
  const modeBtn   = document.getElementById('modeSwitch');
  const subtitle  = document.getElementById('subtitle');
  const errorBox  = document.getElementById('errorBox');

  modeBtn.addEventListener('click', () => {
    registerMode = !registerMode;
    btn.textContent      = registerMode ? 'Create account' : 'Login';
    modeBtn.textContent  = registerMode ? 'Already have an account? Login' : 'Create an account';
    subtitle.textContent = registerMode ? 'Create your account' : 'Enter your credentials';
    errorBox.textContent = '';
  });

  async function postJSON(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed (' + res.status + ')');
    return data;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.textContent = '';
    btn.disabled = true;
    try {
      const data = await postJSON(
        registerMode ? '/api/auth/register' : '/api/auth/login',
        {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }
      );
      window.location.href = data.redirect_url || '/aiva';
    } catch (err) {
      errorBox.textContent = err.message;
    } finally {
      btn.disabled = false;
    }
  });

  // Placeholder button shown until GOOGLE_CLIENT_ID is configured on the server
  const gFallback = document.getElementById('googleFallback');
  if (gFallback) {
    gFallback.addEventListener('click', () => {
      errorBox.textContent =
        'Google Sign-In is not configured yet (server needs GOOGLE_CLIENT_ID). Use username & password for now.';
    });
  }

  // Google Sign-In callback (active when GOOGLE_CLIENT_ID is set)
  window.onGoogleCredential = async (response) => {
    errorBox.textContent = '';
    try {
      const data = await postJSON('/api/auth/google', { credential: response.credential });
      window.location.href = data.redirect_url || '/aiva';
    } catch (err) {
      errorBox.textContent = err.message;
    }
  };
</script>
</body>
</html>
